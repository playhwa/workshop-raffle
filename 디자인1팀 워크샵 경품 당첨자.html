<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인1팀 워크샵 경품 당첨자</title>
<link rel="stylesheet" href="./디자인1팀 워크샵 경품 당첨자_files/pretendard.min.css">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --surface2: #F0EDE7;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1A1714;
    --text2: #6B6560;
    --text3: #9E9890;
    --accent: #C4522A;
    --gold: #C49A2A;
    --silver: #7A8490;
    --bronze: #A0643A;
    --purple: #6B52A8;
    --purple-light: #EEE9F8;
    --teal: #2A7A62;
    --teal-light: #E4F3EE;
    --amber: #B87820;
    --amber-light: #FDF0D8;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 5rem;
  }

  /* ── Header ── */
  .site-header {
    text-align: center;
    padding: 4rem 1.5rem 2.75rem;
  }
  .site-header .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .75rem;
  }
  .site-header h1 {
    font-size: clamp(1.75rem, 5.5vw, 2.75rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1.15;
  }
  .header-rule {
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 1.25rem auto 0;
    border: none;
  }

  /* ── Container ── */
  .container { max-width: 600px; margin: 0 auto; padding: 0 1.25rem; }

  /* ── Tabs ── */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 2rem;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 5px;
  }
  .tab-btn {
    padding: 11px 0;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Pretendard', sans-serif;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text3);
    transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .tab-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 5px rgba(0,0,0,.07);
  }

  /* ── Tab content ── */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Category block ── */
  .category-block { margin-bottom: 2rem; }

  .category-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .category-title svg { width: 12px; height: 12px; }

  /* ── Winner card ── */
  .winner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp .45s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .rank-badge {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .badge-1       { background: #FEF3D6; }
  .badge-2       { background: #F0F1F3; }
  .badge-3       { background: #FAEEE6; }
  .badge-special { background: var(--purple-light); }
  .badge-bonus   { background: var(--teal-light); }
  .badge-potato  { background: var(--amber-light); }
  .badge-num     { background: var(--surface2); font-size:13px; font-weight:700; color:var(--text2); }

  .winner-info { flex: 1; min-width: 0; }
  .winner-prize {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 3px;
    font-weight: 500;
  }
  .winner-names {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rank-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill-1       { background:#FEF3D6; color: var(--gold); }
  .pill-2       { background:#F0F1F3; color: var(--silver); }
  .pill-3       { background:#FAEEE6; color: var(--bronze); }
  .pill-special { background: var(--purple-light); color: var(--purple); }
  .pill-bonus   { background: var(--teal-light);   color: var(--teal); }
  .pill-potato  { background: var(--amber-light);  color: var(--amber); }

  /* 단체전 점수 배지 */
  .score-badge {
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  /* stagger delay */
  .winner-card:nth-child(1) { animation-delay: .05s; }
  .winner-card:nth-child(2) { animation-delay: .13s; }
  .winner-card:nth-child(3) { animation-delay: .21s; }
  .winner-card:nth-child(4) { animation-delay: .29s; }
  .winner-card:nth-child(5) { animation-delay: .37s; }
  .winner-card:nth-child(6) { animation-delay: .45s; }

  /* footer */
  .page-footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: .04em;
  }
</style>
</head>

<script>
function switchTab(key, btn){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + key).classList.add('active');
}
</script>
